name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "devops/k8s/backend-*"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch: # allow manual trigger

env:
  ACR_NAME: movieratingacr
  IMAGE_NAME: backend
  RESOURCE_GROUP: Movie-Rating
  CLUSTER_NAME: aks-movie-rating

jobs:
  # ── CI: Build and Test ─────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: backend

  # ── CD: Deploy (only on push to main, not PRs) ────────────
  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST -f backend/Dockerfile backend/
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Deploy manifests
        run: |
          kubectl apply -f devops/k8s/backend-deployment.yaml
          kubectl apply -f devops/k8s/backend-service.yaml

      - name: Update image to new tag
        run: |
          kubectl set image deployment/backend-deployment \
            backend=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/backend-deployment --timeout=180s
